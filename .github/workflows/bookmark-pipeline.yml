name: Bookmark Articles Pipeline

on:
  schedule:
    - cron: "0 14,21 * * *" # Twice daily: 10:00 AM and 5:00 PM EDT (14:00 and 21:00 UTC)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process-bookmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore OAuth token cache
        id: restore-oauth-token-cache
        uses: actions/cache/restore@v4
        with:
          path: pipeline/cache/.twitter_oauth2_token.json
          key: twitter-oauth2-token-${{ github.run_id }}
          restore-keys: |
            twitter-oauth2-token-

      - name: Fetch bookmarks from X
        working-directory: pipeline
        env:
          TWITTER_CLIENT_ID: ${{ secrets.TWITTER_CLIENT_ID }}
          TWITTER_CLIENT_SECRET: ${{ secrets.TWITTER_CLIENT_SECRET }}
          TWITTER_REFRESH_TOKEN: ${{ secrets.TWITTER_REFRESH_TOKEN }}
        run: python fetch_bookmarks.py

      - name: Save OAuth token cache
        if: always() && hashFiles('pipeline/cache/.twitter_oauth2_token.json') != ''
        uses: actions/cache/save@v4
        with:
          path: pipeline/cache/.twitter_oauth2_token.json
          key: twitter-oauth2-token-${{ github.run_id }}

      - name: Generate articles from bookmarks (Venice AI)
        working-directory: pipeline
        env:
          VENICE_AI_API_KEY: ${{ secrets.VENICE_AI_API_KEY }}
        run: python process_bookmarks.py

      - name: Commit new articles and images
        run: |
          git config user.name "CryptoCatalyst Bot"
          git config user.email "bot@cryptocatalyst.news"
          git add content/articles/ public/images/articles/
          git add content/.tweeted.json 2>/dev/null || true
          NEW_SLUGS=$(git diff --cached --name-only --diff-filter=A -- content/articles/ | sed -E 's#.*/([^/]+)\.json$#\1#')
          if ! git diff --cached --quiet; then
            git commit -m "📌 Bookmark articles: $(date -u +%Y-%m-%d)"
            git pull --rebase origin master
            git push origin master
            echo "$NEW_SLUGS" | python pipeline/notify_indexnow.py
          fi

      - name: Post to Twitter/X
        if: success()
        working-directory: pipeline
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: python post_twitter.py
      
      - name: Commit tweeted tracking file
        if: always()
        run: |
          git add content/.tweeted.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "🐦 Update tweeted tracking (bookmarks)"
            git pull --rebase origin master
            git push origin master
          fi
