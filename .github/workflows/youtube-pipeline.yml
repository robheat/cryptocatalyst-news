name: YouTube Shorts Pipeline

on:
  schedule:
    # Every day at 3pm UTC
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate everything but skip upload)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      scripts_per_run:
        description: "Number of new Shorts to generate"
        required: false
        default: "2"

permissions:
  contents: write

concurrency:
  group: youtube-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  youtube-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements-youtube.txt

      - name: Install system fonts
        run: sudo apt-get install -y fonts-liberation

      - name: Install YouTube pipeline dependencies
        working-directory: pipeline
        run: pip install -r requirements-youtube.txt

      - name: Cache Kokoro ONNX model and voices
        id: cache-kokoro
        uses: actions/cache@v4
        with:
          path: |
            pipeline/kokoro-v1.0.fp16.onnx
            pipeline/voices-v1.0.bin
          key: kokoro-model-voices-v1

      - name: Download Kokoro model and voices files
        if: steps.cache-kokoro.outputs.cache-hit != 'true'
        working-directory: pipeline
        run: |
          wget -q https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.fp16.onnx
          wget -q https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin

      - name: Generate Shorts scripts (Venice AI)
        working-directory: pipeline
        env:
          VENICE_AI_API_KEY: ${{ secrets.VENICE_AI_API_KEY }}
          YT_SCRIPTS_PER_RUN: ${{ github.event.inputs.scripts_per_run || '2' }}
        run: python generate_shorts_script.py

      - name: Generate TTS audio (Kokoro ONNX)
        working-directory: pipeline
        env:
          KOKORO_VOICE: ${{ secrets.KOKORO_VOICE || 'af_heart' }}
        run: python generate_tts.py

      - name: Render Short videos (MoviePy)
        working-directory: pipeline
        env:
          FFMPEG_THREADS: "2"
        run: python render_short.py

      - name: Upload to YouTube
        working-directory: pipeline
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YT_DRY_RUN: ${{ (github.event.inputs.dry_run == 'true') && '1' || '0' }}
        run: python upload_youtube.py

      - name: Commit YouTube queue state
        if: always()
        run: |
          git config user.name "CryptoCatalyst Bot"
          git config user.email "bot@cryptocatalyst.news"
          git pull --rebase --autostash origin master
          git add content/.youtube-queue.json
          git diff --cached --quiet || git commit -m "📹 YouTube queue update $(date -u +%Y-%m-%d)"
          git push origin master
